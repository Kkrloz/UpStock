services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: upstock
      POSTGRES_USER: upstock
      POSTGRES_PASSWORD: change-me
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/upstock
      SPRING_DATASOURCE_USERNAME: upstock
      SPRING_DATASOURCE_PASSWORD: change-me
      JWT_SECRET: generate-via-openssl-rand-base64-32
      ADMIN_PASSWORD: change-me
    depends_on:
      - db

volumes:
  pgdata:
