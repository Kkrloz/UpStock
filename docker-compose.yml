services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: upstock
      POSTGRES_USER: upstock
      POSTGRES_PASSWORD: CHANGE_ME
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/upstock
      SPRING_DATASOURCE_USERNAME: upstock
      SPRING_DATASOURCE_PASSWORD: CHANGE_ME
      JWT_SECRET: change-me-to-a-secure-random-key-at-least-32-chars
      ADMIN_PASSWORD: CHANGE_ME
    depends_on:
      - db

volumes:
  pgdata:
